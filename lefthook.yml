# Lefthook configuration for dotbee
# Reference: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    # Formatting
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --all

    taplo:
      glob: "*.toml"
      run: taplo format {staged_files}

    # Linting/Code Checks
    clippy:
      run: cargo clippy -- -D warnings

    check:
      run: cargo check --all

pre-push:
  commands:
    # Ensure to pass all unit tests before making a push
    test:
      run: cargo test --all
