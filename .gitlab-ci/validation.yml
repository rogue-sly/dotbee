# .gitlab-ci/validation.yml

lint:
  stage: lint
  image: rust:1.92.0
  extends: .cargo_cache
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy -- -D warnings

test:
  stage: test
  image: rust:1.92.0
  extends: .cargo_cache
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cargo test --all
