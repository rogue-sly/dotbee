# .gitlab-ci/build.yml

build:
  stage: build
  image: rust:1.92.0-bullseye
  services:
    - docker:20.10.12-dind
  extends: .cargo_cache
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends docker.io
    - cargo install cross
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - TARGET: x86_64-unknown-linux-musl
        PLATFORM: linux-x64-musl
      - TARGET: aarch64-unknown-linux-musl
        PLATFORM: linux-arm64-musl
      - TARGET: aarch64-linux-android
        PLATFORM: android-arm64
  script:
    - cross build --release --target $TARGET
    - PKG_NAME="${BINARY_NAME}-${CI_COMMIT_TAG}-${PLATFORM}"
    - BIN_FILE="target/$TARGET/release/${BINARY_NAME}"
    - tar -czf ${PKG_NAME}.tar.gz -C "$(dirname "${BIN_FILE}")" "${BINARY_NAME}"
  artifacts:
    paths:
      - ${BINARY_NAME}-*.tar.gz
