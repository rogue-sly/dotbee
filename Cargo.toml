[package]
name = "dotsy"
version = "0.1.0"
authors = ["rogue-87 <rogue87@tuta.io>"]
description = "Dotfiles manager designed for ease of use"
edition = "2024"
repository = "https://github.com/rogue-87/dotsy"
keywords = ["dotsy", "dotfiles"]
categories = ["command-line-utilities"]
license = "MIT"
rust-version = "1.88"

[dependencies]
clap = { version = "4.5.41", features = ["derive"] }
colored = "3.0.0"
demand = "1.7.0"
dirs = "6.0.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
toml = "0.9.10"
trash = "5.2.2"
walkdir = "2.5.0"
