[package]
name = "dotsy"
version = "0.1.0"
authors = ["Rogue87 <rogue87@tuta.io>"]
description = "Dotfiles manager designed for ease of use"
edition = "2024"
repository = "https://gitlab.com/rogue87/dotsy"
keywords = ["dotsy", "dotfiles"]
categories = ["command-line-utilities"]
license = "MIT"
rust-version = "1.92.0"

[dependencies]
clap = { version = "4.5.41", features = ["derive"] }
colored = "3.0.0"
demand = "1.7.0"
dirs = "6.0.0"
nix = "0.30.1"
serde = { version = "1.0.219", features = ["derive"] }
taplo = "0.14.0"
toml = { version = "0.9.10", features = ["parse"] }
trash = "5.2.2"
usage-lib = { version = "2.11.0", features = ["clap"] }
walkdir = "2.5.0"
