# This is the main entry point for the GitLab CI/CD pipeline.
# It defines global configuration and includes modularized pipeline components.

# Per GitLab CI documentation, `include` should be one of the first keys in the file.
# This may also help local linters like `glab` correctly parse the configuration.
include:
  - local: ".gitlab-ci/validation.yml"
  - local: ".gitlab-ci/build.yml"
  - local: ".gitlab-ci/release.yml"

stages:
  - lint
  - test
  - build
  - release

# Global variables are available to all jobs.
variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  BINARY_NAME: dotbee
  # Tell cross to use the docker daemon from the dind service.
  DOCKER_HOST: tcp://docker:2375

# Global workflow rules define when pipelines run.
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Templates defined here are available to all included files.
.cargo_cache:
  cache:
    # Each job gets its own cache. For the matrix job, the key will be like
    # `build:x86_64-unknown-linux-musl`, which is correct as each target needs a separate cache.
    key: "${CI_JOB_NAME}"
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
      - target/
